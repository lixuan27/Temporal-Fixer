<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Temporal Fixer — reconstruction pipeline</title>
<style>
  :root { color-scheme: dark; }
  * { box-sizing: border-box; }
  body { margin:0; background:#0b0e14; color:#e6edf3;
    font:15px/1.65 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    -webkit-font-smoothing:antialiased; }
  .wrap { max-width:980px; margin:0 auto; padding:56px 20px 90px; }
  h1 { font-size:2.1rem; font-weight:700; margin:0 0 4px; letter-spacing:-.02em; }
  h2 { font-size:1.25rem; margin:44px 0 12px; border-bottom:1px solid #1b2430; padding-bottom:8px; }
  .tag { color:#9fb0c0; font-size:1.02rem; margin:0 0 6px; }
  .tag b { color:#e6edf3; }
  .setup { background:#111722; border:1px solid #223; border-left:3px solid #3fb950; border-radius:8px;
    padding:14px 18px; margin:20px 0; font-size:.94rem; }
  .setup b { color:#3fb950; }
  code { background:#161b26; padding:1px 6px; border-radius:4px; font-size:.86em; color:#c9d6e5; }
  video { width:100%; display:block; border-radius:9px; border:1px solid #222c3a; background:#000; }
  figure { margin:0 0 26px; }
  figcaption { color:#8195a8; font-size:.85rem; margin-top:7px; }
  table { width:100%; border-collapse:collapse; margin:14px 0; font-size:.9rem; }
  th,td { padding:7px 10px; text-align:center; border-bottom:1px solid #1b2430; }
  th { color:#9fb0c0; font-weight:600; } td:first-child,th:first-child { text-align:left; }
  .good { color:#3fb950; font-weight:600; } .bad { color:#f0883e; font-weight:600; }
  ul { padding-left:20px; } li { margin:4px 0; }
  .grid2 { display:grid; grid-template-columns:1fr 1fr; gap:20px; }
  @media (max-width:720px){ .grid2 { grid-template-columns:1fr; } }
  a { color:#58a6ff; text-decoration:none; } a:hover { text-decoration:underline; }
  .note { color:#8195a8; font-size:.85rem; }
  footer { color:#59667a; font-size:.85rem; margin-top:46px; border-top:1px solid #1b2430; padding-top:18px; }
</style>
</head>
<body>
<div class="wrap">
  <h1>Temporal Fixer</h1>
  <h2>Reconstruction — source | per-frame reconstruction</h2>
  <figure><video src="assets/fixseed_village_paddy.mp4" autoplay loop muted playsinline preload="metadata"></video>
    <figcaption>Rice paddy / misty hills.</figcaption></figure>
  <figure><video src="assets/recon_valleys.mp4" autoplay loop muted playsinline preload="metadata"></video>
    <figcaption>Harbor / boats.</figcaption></figure>
  <figure><video src="assets/fixseed_rockyriver.mp4" autoplay loop muted playsinline preload="metadata"></video>
    <figcaption>Rocky river / misty hills.</figcaption></figure>
</div>
</body>
</html>
